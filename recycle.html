<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Jomhuria&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jomhuria&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jomhuria&family=Lalezar&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jaldi:wght@400;700&family=Jomhuria&family=Lalezar&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gasoek+One&display=swap" rel="stylesheet">

    <link href="css/mansstils.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="aboutus.html" class="nav-link">About us</a>
        <a href="ourmission.html" class="nav-link">Our mission</a>
        <a href="donate.html" class="nav-link">Donate</a>
    </nav>

    <div class="cloud cloud-left"><img src="images/cloud.png" alt="cloud"></div>
    <div class="cloud cloud-right"><img src="images/cloud.png" alt="cloud"></div>

    <header>
        <h4>RECYCLEHELPER</h4>
        <form id="searchForm" class="search-container small">
            <input type="text" id="searchInput" placeholder="Search another item..." required>
            <button type="submit">🔍</button>
        </form>
    </header>

    <main class="container">
        
       <section class="lifehack-section">
           <div class="lifehack-layout">
<div class="lifehack-image">
<img id="itemImage" src="images/placeholder.png">
</div>
<div class="lifehack-right">
<h5 class="lifehack-header">Lifehacks and Homemade Ideas</h5>
<div class="lifehack-cards">
<div class="lifehack-card" id="diy-0"></div>
<div class="lifehack-card" id="diy-1"></div>
<div class="lifehack-card" id="diy-2"></div>
</div>
</div>
 </div>
</section>
        

        <div class="bottom-row">
            <div class="glass-panel calculator">
                <h3>Efficiency Calculator</h3>
                <div class="calc-input-group">
                    <label for="calcQty">Amount of Items:</label>
                    <input type="number" id="calcQty" value="1" min="1">
                </div>
                
                <div class="results-display">
                    <div class="stat-item">
                        <span class="stat-label">Saved Water:</span>
                        <span class="stat-value"><span id="saveWater">0</span> L</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Saved Energy:</span>
                        <span class="stat-value"><span id="saveEnergy">0</span> kWh</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Saved CO2:</span>
                        <span class="stat-value"><span id="saveCO2">0</span> kg</span>
                    </div>
                </div>
            </div>

            <div class="glass-panel map-container">
                <h3>Find Closest Deposit Point</h3>
                <div class="map-controls">
                    <input type="text" id="addressInput" placeholder="Enter address...">
                    <button onclick="findCenters()" class="map-btn">Find Points</button>
                </div>
                <div id="map" style="height: 250px; width: 100%; border-radius: 15px; margin-top: 15px;"></div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
    <script src="js/recycle.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
    
</body>
</html>
