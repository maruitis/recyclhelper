<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecycleHelper - Your Impact</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:wght@400;700&family=Gasoek+One&family=Inter:wght@400;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="css/mansstils.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="aboutus.html" class="nav-link">About us</a>
        <a href="ourmission.html" class="nav-link">Our mission</a>
        <a href="donate.html" class="nav-link">Donate</a>
    </nav>

    <div class="cloud cloud-left"><img src="images/cloud.png" alt="cloud"></div>
    <div class="cloud cloud-right"><img src="images/cloud.png" alt="cloud"></div>

    <header>
        <h4>RECYCLEHELPER</h4>
        <form id="searchForm" class="search-container small">
            <input type="text" id="searchInput" placeholder="Search another item..." required>
            <button type="submit">🔍</button>
        </form>
    </header>

    <main class="container">
        
        <section class="diy-section">
    <div class="diy-cards-container">
        <h4 class="diy-title" id="diyHeader">Lifehacks and Homemade Ideas</h4>
        
        <div class="diy-cards">
            <div class="diy-card" id="diy-0">
                <div class="idea-content">
                    <span class="idea-title">Loading Idea 1...</span>
                </div>
            </div>

            <div class="diy-card" id="diy-1">
                <div class="idea-content">
                    <span class="idea-title">Loading Idea 2...</span>
                </div>
            </div>

            <div class="diy-card" id="diy-2">
                <div class="idea-content">
                    <span class="idea-title">Loading Idea 3...</span>
                </div>
            </div>
        </div>
    </div>
</section>

        <div class="bottom-row">
            <div class="glass-panel calculator">
                <h3>Efficiency Calculator</h3>
                <div class="calc-input-group">
                    <label for="calcQty">Amount of Items:</label>
                    <input type="number" id="calcQty" value="1" min="1">
                </div>
                
                <div class="results-display">
                    <div class="stat-item">
                        <span class="stat-label">Saved Water:</span>
                        <span class="stat-value"><span id="saveWater">0</span> L</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Saved Energy:</span>
                        <span class="stat-value"><span id="saveEnergy">0</span> kWh</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Saved CO2:</span>
                        <span class="stat-value"><span id="saveCO2">0</span> kg</span>
                    </div>
                </div>
            </div>

            <div class="glass-panel map-container">
                <h3>Find Closest Deposit Point</h3>
                <div class="map-controls">
                    <input type="text" id="addressInput" placeholder="Enter address...">
                    <button onclick="findCenters()" class="map-btn">Find Points</button>
                </div>
                <div id="map" style="height: 250px; width: 100%; border-radius: 15px; margin-top: 15px;"></div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
    <script src="js/recycle.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
    
    <div id="diyModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="font-family: 'Gasoek One'; color: #0E0973;"></h2>
        <p><strong>What you need:</strong> <span id="modalNeeds"></span></p>
        <hr>
        <h3 style="color: #0E0973;">Steps:</h3>
        <ol id="modalSteps" style="line-height: 1.6;"></ol>
    </div>
</div>

</body>
</html>
