<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Jomhuria&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Gasoek+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jaldi:wght@400;700&family=Jomhuria&family=Lalezar&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mansstils.css">
    <script>(function(){var t=localStorage.getItem('recycle_theme');if(t==='dark'||t==='sky')document.documentElement.setAttribute('data-theme',t);})();</script>

    <style>
        /* ── Page layout ─────────────────────────────────────── */
        .wi-page {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 28px;
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 24px 80px;
            box-sizing: border-box;
        }

        /* ── LEFT PANEL ──────────────────────────────────────── */
        .wi-left {
            flex: 0 0 300px;
            position: sticky;
            top: 88px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .wi-left-heading {
            font-family: "Jomhuria", sans-serif;
            font-size: 38px;
            font-weight: 400;
            color: #0C365F;
            text-align: center;
            margin: 0;
            text-shadow: 1px 3px 8px rgba(12,54,95,0.25);
        }

        /* 3-column grid of 12 tiles */
        .wi-tile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .wi-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            padding: 8px 4px 6px;
            background: none;
            border: none;
            box-shadow: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-align: center;
        }

        .wi-tile:hover { transform: translateY(-4px); }

        .wi-tile.active { transform: translateY(-3px); }

        .wi-tile-img {
            width: 58px;
            height: 58px;
            object-fit: contain;
            filter:
                drop-shadow(0 4px 10px rgba(0,0,0,0.22))
                drop-shadow(0 1px 3px rgba(0,0,0,0.14));
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .wi-tile:hover .wi-tile-img {
            transform: scale(1.1);
            filter:
                drop-shadow(0 6px 16px rgba(0,0,0,0.28))
                drop-shadow(0 2px 5px rgba(0,0,0,0.16));
        }

        .wi-tile.active .wi-tile-img {
            transform: scale(1.1);
            filter:
                drop-shadow(0 0 10px rgba(74,124,224,0.6))
                drop-shadow(0 4px 12px rgba(0,0,0,0.22));
        }

        .wi-tile-emoji {
            font-size: 2.5rem;
            line-height: 1;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
        }

        .wi-tile-label {
            font-family: "Jaldi", sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: #1a3a52;
            line-height: 1.2;
            word-break: break-word;
            text-shadow: 0 1px 4px rgba(255,255,255,0.7);
        }

        .wi-tile.active .wi-tile-label {
            color: #0C365F;
            text-shadow: 0 1px 6px rgba(74,124,224,0.35);
        }

        /* ── RIGHT PANEL ─────────────────────────────────────── */
        .wi-right {
            flex: 1;
            min-width: 0;
        }

        .wi-detail-card {
            background: rgba(255,255,255,0.48);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1.5px solid rgba(255,255,255,0.6);
            box-shadow: 0 6px 30px rgba(30,100,60,0.13);
            padding: 28px 30px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes wiDetailFade {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .wi-detail-fade { animation: wiDetailFade 0.32s ease; }

        .wi-detail-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .wi-detail-icon {
            font-size: 2.8rem;
            line-height: 1;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
        }

        .wi-detail-title {
            font-family: "Gasoek One", sans-serif;
            font-size: 2rem;
            font-weight: 400;
            margin: 0;
            background-image: linear-gradient(90deg, #1C9073, #0E0973);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Items strip */
        .wi-items-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: flex-end;
        }

        .wi-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .wi-item-img {
            width: 62px;
            height: 62px;
            object-fit: contain;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.15));
        }

        .wi-item-emoji-lg {
            font-size: 2.8rem;
            line-height: 1;
        }

        .wi-item-label {
            font-family: "Jaldi", sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #2a4a35;
            text-align: center;
            max-width: 70px;
        }

        /* Container row */
        .wi-container-row {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.38);
            border-radius: 16px;
            padding: 12px 18px;
        }

        .wi-container-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 3px 8px rgba(0,0,0,0.18));
        }

        .wi-container-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .wi-container-name {
            font-family: "Gasoek One", sans-serif;
            font-size: 1.05rem;
            color: #0C365F;
        }

        .wi-container-desc {
            font-family: "Jaldi", sans-serif;
            font-size: 0.85rem;
            color: #2a4a35;
            line-height: 1.4;
        }

        /* How-to / Why sections */
        .wi-section-title {
            font-family: "Jomhuria", sans-serif;
            font-size: 1.55rem;
            color: #154A73;
            margin: 0 0 6px;
            line-height: 1.1;
        }

        .wi-section-text {
            font-family: "Jaldi", sans-serif;
            font-size: 0.9rem;
            color: #2a4a35;
            line-height: 1.6;
            margin: 0;
            padding-left: 18px;
        }

        .wi-section-text li { margin-bottom: 3px; }

        .wi-divider {
            border: none;
            border-top: 1px solid rgba(100,180,120,0.28);
            margin: 0;
        }

        /* ── DARK THEME ──────────────────────────────────────── */
        [data-theme="dark"] .wi-left-heading   { color: #c080ff; text-shadow: 0 0 18px rgba(180,80,255,0.4); }
        [data-theme="dark"] .wi-tile-label     { color: #d0b8f8; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
        [data-theme="dark"] .wi-tile.active .wi-tile-label { color: #f0e0ff; text-shadow: 0 1px 6px rgba(160,100,255,0.5); }
        [data-theme="dark"] .wi-tile.active .wi-tile-img   { filter: drop-shadow(0 0 12px rgba(160,80,255,0.65)) drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
        [data-theme="dark"] .wi-detail-card    { background: rgba(14,0,32,0.82); border-color: rgba(130,65,240,0.45); box-shadow: 0 6px 30px rgba(0,0,0,0.5); }
        [data-theme="dark"] .wi-detail-title   { background-image: linear-gradient(90deg,#a060ff,#5040d0); }
        [data-theme="dark"] .wi-container-row  { background: rgba(30,0,60,0.5); }
        [data-theme="dark"] .wi-container-name { color: #d8b8ff; }
        [data-theme="dark"] .wi-container-desc { color: #a8c090; }
        [data-theme="dark"] .wi-section-title  { color: #c080ff; }
        [data-theme="dark"] .wi-section-text   { color: #c8d8e8; }
        [data-theme="dark"] .wi-item-label     { color: #b8d0a0; }
        [data-theme="dark"] .wi-divider        { border-color: rgba(130,65,240,0.25); }

        /* ── SKY THEME ───────────────────────────────────────── */
        [data-theme="sky"] .wi-left-heading   { color: #1a78c2; }
        [data-theme="sky"] .wi-tile-label     { color: #1a4a70; text-shadow: 0 1px 4px rgba(255,255,255,0.8); }
        [data-theme="sky"] .wi-tile.active .wi-tile-img   { filter: drop-shadow(0 0 10px rgba(58,154,224,0.6)) drop-shadow(0 4px 12px rgba(0,0,0,0.18)); }
        [data-theme="sky"] .wi-detail-card    { background: rgba(230,245,255,0.7); border-color: rgba(100,180,240,0.4); }
        [data-theme="sky"] .wi-detail-title   { background-image: linear-gradient(90deg,#1a78c2,#0050a0); }
        [data-theme="sky"] .wi-container-row  { background: rgba(200,230,255,0.5); }
        [data-theme="sky"] .wi-container-name { color: #0a4fa0; }
        [data-theme="sky"] .wi-container-desc { color: #1a5070; }
        [data-theme="sky"] .wi-section-title  { color: #1a78c2; }
        [data-theme="sky"] .wi-section-text   { color: #1a3a52; }
        [data-theme="sky"] .wi-item-label     { color: #1a5070; }
        [data-theme="sky"] .wi-divider        { border-color: rgba(60,150,230,0.25); }

        /* ── MOBILE ──────────────────────────────────────────── */
        @media (max-width: 860px) {
            .wi-page      { flex-direction: column; padding: 0 16px 60px; gap: 20px; }
            .wi-left      { position: static; flex: unset; width: 100%; }
            .wi-tile-grid { grid-template-columns: repeat(4, 1fr); }
            .wi-tile-img  { width: 42px; height: 42px; }
            .wi-tile-emoji{ font-size: 2rem; }
            .wi-tile-label{ font-size: 10px; }
            .wi-detail-card { padding: 20px 18px 24px; }
            .wi-detail-title{ font-size: 1.5rem; }
        }

        @media (max-width: 480px) {
            .wi-tile-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
