<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Recycle | Item Details</title>
    <link rel="stylesheet" href="mansstils.css">
    <!-- Google Maps API for the recycling points -->
    <script src="https://googleapis.com"></script>
</head>

    <nav class="glass-nav">
        <button onclick="window.location.href='index.html'">← BACK</button>
        <h2 id="display-item-name">Loading Item...</h2>
    </nav>

    <main class="container">
        <!-- 1. MATERIAL INFO CARD -->
        <section class="glass-card info-grid">
            <div class="material-details">
                <h3 id="full-name">Searching...</h3>
                <p><strong>Material:</strong> <span id="material-type">---</span></p>
                <p><strong>Feel:</strong> <span id="item-feel">---</span></p>
                <div class="recycling-advice">
                    <h4>How to Recycle:</h4>
                    <p id="advice-text">Analyzing material properties...</p>
                </div>
            </div>
            
            <!-- 2. EFFICIENCY CALCULATOR -->
            <div class="calculator-box">
                <h3>Impact Saved (per kg)</h3>
                <div class="stat"><i class="blue">💧</i> Water: <span id="water-val">0</span> L</div>
                <div class="stat"><i class="yellow">⚡</i> Energy: <span id="energy-val">0</span> kWh</div>
                <div class="stat"><i class="green">🌿</i> CO2: <span id="co2-val">0</span> kg</div>
            </div>
        </section>

        <!-- 3. DIY IDEAS SECTION -->
        <section class="diy-section">
            <h2>3 DIY Upcycling Ideas</h2>
            <div id="diy-container" class="diy-grid">
                <!-- AI Ideas will be injected here -->
            </div>
        </section>

        <!-- 4. MAP SECTION -->
        <section class="glass-card map-section">
            <h3>Find 5 Closest Recycling Points</h3>
            <div class="map-input-group">
                <input type="text" id="user-address" placeholder="Enter your full address...">
                <button id="find-map-btn">FIND POINTS</button>
            </div>
            <ul id="map-list" class="points-list"></ul>
        </section>
    </main>

    <script src="main.js"></script>
    <script src="map.js"></script>
    <script src="items.js"></script>
</body>
</html>
