<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RecycleHelper - Item Details</title>
    <link href="css/mansstils.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="aboutus.html" class="nav-link">About us</a>
        <a href="ourmission.html" class="nav-link">Our mission</a>
        <a href="donate.html" class="nav-link">Donate</a>
    </nav>

    <div class="cloud cloud-left"><img src="images/cloud.png" alt="cloud"></div>
    <div class="cloud cloud-right"><img src="images/cloud.png" alt="cloud"></div>

    <h4 id="displayItemName">RECYCLEHELPER</h4>

    <form id="searchForm" class="search-container small">
        <input type="text" id="searchInput" placeholder="Search another item..." required>
        <button type="submit">🔍</button>
    </form>

    <div class="container">
        <div class="sidebar">
            <div class="detail-spec">
                <label id="detailQuestion">Detail Spec:</label>
                <select id="detailSelect">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
        </div>

        <div class="content-grid">
            <h3>Choose the most popular material for this item:</h3>
            <section class="materials-grid" id="materialGrid"></section>
            
            <div class="action-btn-container">
                <button id="nextBtn" class="primary-btn" style="display:none;">Calculate Recycling Options</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
    <script src="js/item.js"></script>
</body>
</html>
