    <h4>RECYCLEHELPER</h4>
   <form id="searchForm" class="search-container small">
    <input type="text" id="searchInput" placeholder="Search (e.g. plastic bottle, book etc.)" required>
    <button type="submit">🔍</button>
</form>
    
 <section class="diy-section">
        <div class="diy-cards-container">
    <h3 class="diy-title">lifehacks and homemade ideas</h3>
    <div class="diy-cards">
        <div class="diy-card"><span class="idea-title">Idea 1</span></div>
        <div class="diy-card"><span class="idea-title">Idea 2</span></div>
        <div class="diy-card"><span class="idea-title">Idea 3</span></div>
    </div>
        </div>
</section>

    <div class="container">
        <div class="sidebar">
            <img id="itemImage" src="https://via.placeholder.com/200x400?text=Item" alt="Item">
            <div class="detail-spec">
                <label>Detail Spec:</label>
                <select id="detailToggle">
                    <option value="default">Standard</option>
                    <option value="option1">With Cap/Detail</option>
                </select>
            </div>
        </div>

        <div class="content-grid">
            <section class="materials-grid" id="materialsContainer">
                </section>

            <section class="glass-panel lifehacks">
                <h3>LIFEHACKS FOR RECYCLING</h3>
                <div id="lifehacksContent">Loading...</div>
            </section>

  

            <div class="bottom-row">
                <div class="glass-panel calculator">
                    <h3>Efficiency Calculator</h3>
                    <div class="calc-input">
                        Amount: <input type="number" id="calcQty" value="1" min="1">
                    </div>
                    <p>Saved Water: <span id="saveWater">0</span>L</p>
                    <p>Saved Energy: <span id="saveEnergy">0</span>kWh</p>
                    <p>Saved CO2: <span id="saveCO2">0</span>g</p>
                </div>

                <div class="glass-panel map-container">
                    <h3>Find closest deposit point</h3>
                    <input type="text" id="addressInput" placeholder="Your full address...">
                    <div id="map" style="height: 200px; border-radius: 15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
